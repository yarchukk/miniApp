<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ItalUA — Вивчай італійську</title>

  <!-- Telegram Web App SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Unbounded:wght@700;900&display=swap" rel="stylesheet">

  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:    #58CC02;
      --green-dk: #45A800;
      --red:      #FF4B4B;
      --red-dk:   #CC0000;
      --blue:     #1CB0F6;
      --yellow:   #FFD000;
      --bg:       #131F2E;
      --card:     #1E2E42;
      --card2:    #243447;
      --text:     #FFFFFF;
      --muted:    #7A9AB8;
      --border:   #2D4460;
      --radius:   18px;
      --font:     'Nunito', sans-serif;
      --font-hero:'Unbounded', sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    /* ===== SCREEN WRAPPER ===== */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
      padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 0);
    }

    /* ===== HEADER ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px 10px;
      flex-shrink: 0;
    }

    .logo {
      font-family: var(--font-hero);
      font-size: 17px;
      color: var(--green);
      letter-spacing: -0.5px;
    }

    .xp-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: 40px;
      padding: 6px 14px;
      font-weight: 800;
      font-size: 14px;
      color: var(--yellow);
      transition: transform 0.15s;
    }

    .xp-badge.pop {
      animation: xp-pop 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97);
    }

    @keyframes xp-pop {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.35) rotate(-3deg); }
      60%  { transform: scale(0.95) rotate(1deg); }
      100% { transform: scale(1); }
    }

    /* ===== PROGRESS BAR ===== */
    .progress-wrap {
      padding: 0 20px 16px;
      flex-shrink: 0;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .progress-bar {
      height: 10px;
      background: var(--card);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--green-dk), var(--green));
      border-radius: 99px;
      transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
      box-shadow: 0 0 8px rgba(88,204,2,.5);
    }

    /* ===== MAIN CARD ===== */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0 20px;
      overflow: hidden;
    }

    .situation-tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(28,176,246,.12);
      color: var(--blue);
      border: 1.5px solid rgba(28,176,246,.25);
      border-radius: 40px;
      padding: 5px 13px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.3px;
      margin-bottom: 16px;
      width: fit-content;
    }

    .question-card {
      background: var(--card);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 20px;
      margin-bottom: 18px;
      position: relative;
      overflow: hidden;
    }

    .question-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--blue), var(--green));
    }

    .question-label {
      font-size: 11px;
      color: var(--muted);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 10px;
    }

    .question-it {
      font-size: 26px;
      font-weight: 900;
      line-height: 1.25;
      margin-bottom: 8px;
      color: #fff;
    }

    .question-context {
      font-size: 14px;
      color: var(--muted);
      font-weight: 600;
      line-height: 1.5;
    }

    /* ===== OPTIONS ===== */
    .options {
      display: flex;
      flex-direction: column;
      gap: 11px;
      flex: 1;
    }

    .option-btn {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      transition: transform 0.12s, border-color 0.15s, background 0.15s;
      text-align: left;
      -webkit-tap-highlight-color: transparent;
      position: relative;
      overflow: hidden;
    }

    .option-btn:active:not(:disabled) {
      transform: scale(0.97);
    }

    .option-letter {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: var(--card2);
      border: 1.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 13px;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }

    .option-text {
      font-size: 15px;
      font-weight: 700;
      line-height: 1.35;
      color: var(--text);
    }

    /* States */
    .option-btn.correct {
      border-color: var(--green);
      background: rgba(88,204,2,.1);
      animation: shake-correct 0.4s ease;
    }
    .option-btn.correct .option-letter {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .option-btn.wrong {
      border-color: var(--red);
      background: rgba(255,75,75,.1);
      animation: shake-wrong 0.5s ease;
    }
    .option-btn.wrong .option-letter {
      background: var(--red);
      border-color: var(--red);
      color: #fff;
    }

    .option-btn:disabled { cursor: default; }

    @keyframes shake-correct {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(5px); }
      75%      { transform: translateX(-5px); }
    }

    @keyframes shake-wrong {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      40%      { transform: translateX(8px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }

    /* ===== FEEDBACK BANNER ===== */
    .feedback {
      margin-top: 14px;
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transform: translateY(20px);
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      flex-shrink: 0;
    }

    .feedback.show {
      opacity: 1;
      transform: translateY(0);
    }

    .feedback.feedback-correct {
      background: rgba(88,204,2,.12);
      border: 1.5px solid rgba(88,204,2,.3);
    }

    .feedback.feedback-wrong {
      background: rgba(255,75,75,.12);
      border: 1.5px solid rgba(255,75,75,.3);
    }

    .feedback-icon {
      font-size: 22px;
      flex-shrink: 0;
      margin-top: 1px;
    }

    .feedback-title {
      font-weight: 900;
      font-size: 15px;
      margin-bottom: 3px;
    }

    .feedback-correct .feedback-title { color: var(--green); }
    .feedback-wrong  .feedback-title { color: var(--red); }

    .feedback-sub {
      font-size: 13px;
      color: var(--muted);
      font-weight: 600;
      line-height: 1.45;
    }

    /* ===== BOTTOM AREA ===== */
    .bottom {
      padding: 14px 20px 20px;
      flex-shrink: 0;
    }

    .next-btn {
      width: 100%;
      padding: 17px;
      border-radius: var(--radius);
      border: none;
      font-family: var(--font);
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: transform 0.12s, filter 0.12s, opacity 0.2s;
      opacity: 0;
      pointer-events: none;
    }

    .next-btn.visible {
      opacity: 1;
      pointer-events: all;
    }

    .next-btn.correct-btn {
      background: var(--green);
      color: #fff;
      box-shadow: 0 4px 0 var(--green-dk);
    }

    .next-btn.wrong-btn {
      background: var(--red);
      color: #fff;
      box-shadow: 0 4px 0 var(--red-dk);
    }

    .next-btn:active {
      transform: translateY(3px);
      box-shadow: none !important;
    }

    /* ===== CONFETTI PARTICLE ===== */
    .confetti {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      top: -10px;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: fall linear forwards;
    }

    @keyframes fall {
      to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* ===== XP FLOAT ===== */
    .xp-float {
      position: fixed;
      pointer-events: none;
      font-family: var(--font-hero);
      font-size: 18px;
      font-weight: 900;
      color: var(--yellow);
      text-shadow: 0 2px 10px rgba(255,208,0,.6);
      z-index: 200;
      animation: float-up 1.1s ease forwards;
    }

    @keyframes float-up {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      60%  { opacity: 1; transform: translateY(-60px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-90px) scale(0.8); }
    }

    /* ===== STREAK indicator ===== */
    .streak-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      font-weight: 800;
      color: var(--muted);
    }
  </style>
</head>
<body>

<!-- Confetti canvas -->
<div class="confetti" id="confetti"></div>

<div id="app">

  <!-- Header -->
  <div class="header">
    <span class="logo">ItalUA</span>
    <div class="streak-pill" id="streakPill">🔥 <span id="streakCount">0</span></div>
    <div class="xp-badge" id="xpBadge">⚡ <span id="xpCount">0</span> XP</div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="lessonLabel">Урок 1 — Магазин</span>
      <span id="progressLabel">1 / 5</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width: 10%"></div>
    </div>
  </div>

  <!-- Main -->
  <div class="main" id="main">
    <div class="situation-tag" id="situationTag">🛒 Супермаркет</div>

    <div class="question-card">
      <div class="question-label">Що це означає?</div>
      <div class="question-it" id="questionIT">Quanto costa?</div>
      <div class="question-context" id="questionContext">Ви в магазині. Хочете дізнатися ціну товару.</div>
    </div>

    <div class="options" id="options"></div>

    <div class="feedback" id="feedback">
      <div class="feedback-icon" id="feedbackIcon"></div>
      <div>
        <div class="feedback-title" id="feedbackTitle"></div>
        <div class="feedback-sub" id="feedbackSub"></div>
      </div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom">
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Далі →</button>
  </div>

</div>

<script>
// ===== TELEGRAM WEB APP INIT =====
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#131F2E');
  tg.setBackgroundColor('#131F2E');
}

const user = tg?.initDataUnsafe?.user;

// ===== DATA =====
const QUESTIONS = [
  {
    situation: "🛒 Супермаркет",
    it: "Quanto costa?",
    context: "Ви в магазині. Хочете дізнатися ціну товару.",
    correct: 1,
    options: ["Де знаходиться каса?", "Скільки коштує?", "Де це зроблено?", "Я не розумію"],
    explanation: "«Quanto costa?» — найважливіша фраза в магазині. Дослівно: «Скільки це коштує?»"
  },
  {
    situation: "🏠 Оренда",
    it: "È incluso nel prezzo?",
    context: "Орендодавець називає ціну. Ви хочете знати, що включено.",
    correct: 2,
    options: ["Коли можна в'їхати?", "Скільки кімнат?", "Це включено у вартість?", "Є гараж?"],
    explanation: "«Incluso» — включений. Завжди питайте це при оренді: комуналка, інтернет, парковка."
  },
  {
    situation: "💼 Робота",
    it: "Ho un appuntamento con il direttore.",
    context: "Ви прийшли на співбесіду. Ресепшн питає мету візиту.",
    correct: 0,
    options: ["У мене зустріч з директором.", "Я хочу залишити CV.", "Де знаходиться офіс?", "Я заблукав."],
    explanation: "«Appuntamento» = зустріч/запис. «Direttore» = директор. Класична фраза для офісу."
  },
  {
    situation: "📋 Документи",
    it: "Dove devo firmare?",
    context: "Вам дали документ для підписання. Де поставити підпис?",
    correct: 3,
    options: ["Скільки це коштує?", "Коли готово?", "Мені потрібен перекладач.", "Де потрібно підписати?"],
    explanation: "«Firmare» = підписувати. «Dove devo...» = «Де мені потрібно...» — корисна конструкція!"
  },
  {
    situation: "🚌 Транспорт",
    it: "Questo autobus va in centro?",
    context: "Ви на зупинці. Хочете дістатися до центру міста.",
    correct: 1,
    options: ["Де купити квиток?", "Цей автобус їде в центр?", "Як довго їхати?", "Де наступна зупинка?"],
    explanation: "«Autobus» = автобус, «centro» = центр міста. «Va in...» = «їде в...»"
  }
];

// ===== STATE =====
let xp        = parseInt(localStorage.getItem('italua_xp') || '0');
let streak    = parseInt(localStorage.getItem('italua_streak') || '0');
let qIndex    = 0;
let answered  = false;

// ===== DOM =====
const xpCountEl    = document.getElementById('xpCount');
const streakEl     = document.getElementById('streakCount');
const progressFill = document.getElementById('progressFill');
const progressLbl  = document.getElementById('progressLabel');
const situationTag = document.getElementById('situationTag');
const questionIT   = document.getElementById('questionIT');
const questionCtx  = document.getElementById('questionContext');
const optionsEl    = document.getElementById('options');
const feedback     = document.getElementById('feedback');
const feedbackIcon = document.getElementById('feedbackIcon');
const feedbackTitle= document.getElementById('feedbackTitle');
const feedbackSub  = document.getElementById('feedbackSub');
const nextBtn      = document.getElementById('nextBtn');
const xpBadge      = document.getElementById('xpBadge');

// ===== INIT =====
xpCountEl.textContent  = xp;
streakEl.textContent   = streak;
renderQuestion();

// ===== RENDER =====
function renderQuestion() {
  answered = false;
  const q = QUESTIONS[qIndex];

  // Update UI
  situationTag.textContent   = q.situation;
  questionIT.textContent     = q.it;
  questionCtx.textContent    = q.context;
  progressLbl.textContent    = `${qIndex + 1} / ${QUESTIONS.length}`;
  progressFill.style.width   = `${((qIndex + 1) / QUESTIONS.length) * 100}%`;

  // Reset feedback
  feedback.className = 'feedback';
  nextBtn.className  = 'next-btn';

  // Render options
  optionsEl.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `
      <div class="option-letter">${letters[i]}</div>
      <div class="option-text">${opt}</div>
    `;
    btn.onclick = () => selectAnswer(i);
    optionsEl.appendChild(btn);
  });
}

// ===== SELECT ANSWER =====
function selectAnswer(chosen) {
  if (answered) return;
  answered = true;

  const q    = QUESTIONS[qIndex];
  const btns = optionsEl.querySelectorAll('.option-btn');
  const correct = chosen === q.correct;

  // Disable all
  btns.forEach(b => b.disabled = true);

  // Mark chosen
  btns[chosen].classList.add(correct ? 'correct' : 'wrong');

  // Always show correct
  if (!correct) {
    btns[q.correct].classList.add('correct');
  }

  // Show feedback
  feedback.className = `feedback show feedback-${correct ? 'correct' : 'wrong'}`;
  feedbackIcon.textContent  = correct ? '🎉' : '💡';
  feedbackTitle.textContent = correct ? 'Правильно!' : 'Не зовсім…';
  feedbackSub.textContent   = q.explanation;

  // Handle XP + streak
  if (correct) {
    xp += 10;
    streak++;
    localStorage.setItem('italua_xp',     xp);
    localStorage.setItem('italua_streak', streak);
    xpCountEl.textContent = xp;
    streakEl.textContent  = streak;

    // Animate XP badge
    xpBadge.classList.remove('pop');
    void xpBadge.offsetWidth;
    xpBadge.classList.add('pop');

    // Float +10 XP
    spawnXPFloat('+10 XP');

    // Confetti
    spawnConfetti();

    // Telegram haptic
    tg?.HapticFeedback?.notificationOccurred('success');
  } else {
    streak = 0;
    localStorage.setItem('italua_streak', streak);
    streakEl.textContent = streak;
    tg?.HapticFeedback?.notificationOccurred('error');
  }

  // Show Next button
  nextBtn.className  = `next-btn visible ${correct ? 'correct-btn' : 'wrong-btn'}`;
  nextBtn.textContent = qIndex < QUESTIONS.length - 1 ? 'Далі →' : '🏁 Завершити урок';

  // Telegram MainButton (optional)
  if (tg?.MainButton) {
    tg.MainButton.setText(qIndex < QUESTIONS.length - 1 ? 'Далі' : 'Завершити');
    tg.MainButton.show();
    tg.MainButton.onClick(nextQuestion);
  }
}

// ===== NEXT =====
function nextQuestion() {
  tg?.MainButton?.hide();

  if (qIndex < QUESTIONS.length - 1) {
    qIndex++;
    renderQuestion();
  } else {
    showFinish();
  }
}

// ===== FINISH SCREEN =====
function showFinish() {
  const main = document.getElementById('main');
  const bottom = document.querySelector('.bottom');

  main.innerHTML = `
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;padding-bottom:20px;">
      <div style="font-size:64px;line-height:1">🇮🇹</div>
      <div style="font-family:'Unbounded',sans-serif;font-size:22px;font-weight:900;color:#58CC02;line-height:1.25">
        Урок завершено!
      </div>
      <div style="color:#7A9AB8;font-size:14px;font-weight:700;line-height:1.6;max-width:260px">
        ${user ? `${user.first_name}, ти` : 'Ти'} молодець!<br>Продовжуй вчити щодня.
      </div>
      <div style="background:#1E2E42;border:1.5px solid #2D4460;border-radius:16px;padding:20px 28px;display:flex;gap:32px;margin-top:6px">
        <div style="text-align:center">
          <div style="font-size:26px;font-weight:900;color:#FFD000">+${QUESTIONS.length * 10}</div>
          <div style="font-size:11px;color:#7A9AB8;font-weight:700;margin-top:4px;text-transform:uppercase;letter-spacing:.5px">XP зароблено</div>
        </div>
        <div style="text-align:center">
          <div style="font-size:26px;font-weight:900;color:#1CB0F6">${xp}</div>
          <div style="font-size:11px;color:#7A9AB8;font-weight:700;margin-top:4px;text-transform:uppercase;letter-spacing:.5px">Всього XP</div>
        </div>
      </div>
    </div>
  `;

  bottom.innerHTML = `
    <button class="next-btn correct-btn visible" style="opacity:1;pointer-events:all" onclick="restartLesson()">
      🔄 Пройти знову
    </button>
  `;

  spawnConfetti(60);

  // Telegram close or notify
  if (tg) {
    tg.MainButton.setText('Закрити');
    tg.MainButton.show();
    tg.MainButton.onClick(() => tg.close());
  }
}

// ===== RESTART =====
function restartLesson() {
  qIndex = 0;

  // Rebuild main section
  document.getElementById('main').innerHTML = `
    <div class="situation-tag" id="situationTag"></div>
    <div class="question-card">
      <div class="question-label">Що це означає?</div>
      <div class="question-it" id="questionIT"></div>
      <div class="question-context" id="questionContext"></div>
    </div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback">
      <div class="feedback-icon" id="feedbackIcon"></div>
      <div>
        <div class="feedback-title" id="feedbackTitle"></div>
        <div class="feedback-sub" id="feedbackSub"></div>
      </div>
    </div>
  `;

  document.querySelector('.bottom').innerHTML = `
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Далі →</button>
  `;

  // Re-bind DOM refs
  Object.assign(window, {
    situationTag: document.getElementById('situationTag'),
    questionIT:   document.getElementById('questionIT'),
    questionCtx:  document.getElementById('questionContext'),
    optionsEl:    document.getElementById('options'),
    feedback:     document.getElementById('feedback'),
    feedbackIcon: document.getElementById('feedbackIcon'),
    feedbackTitle:document.getElementById('feedbackTitle'),
    feedbackSub:  document.getElementById('feedbackSub'),
    nextBtn:      document.getElementById('nextBtn'),
  });

  renderQuestion();
}

// ===== CONFETTI =====
function spawnConfetti(count = 30) {
  const wrap = document.getElementById('confetti');
  const colors = ['#58CC02','#FFD000','#1CB0F6','#FF4B4B','#A259FF','#FFF'];
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `
      left: ${Math.random() * 100}%;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      width: ${Math.random() * 8 + 5}px;
      height: ${Math.random() * 8 + 5}px;
      border-radius: ${Math.random() > .5 ? '50%' : '2px'};
      animation-duration: ${Math.random() * 1.5 + 1}s;
      animation-delay: ${Math.random() * 0.4}s;
    `;
    wrap.appendChild(p);
    setTimeout(() => p.remove(), 2500);
  }
}

// ===== XP FLOAT =====
function spawnXPFloat(text) {
  const badge = document.getElementById('xpBadge');
  const rect  = badge.getBoundingClientRect();
  const el    = document.createElement('div');
  el.className = 'xp-float';
  el.textContent = text;
  el.style.left = `${rect.left + rect.width / 2 - 25}px`;
  el.style.top  = `${rect.top}px`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}
</script>
